name: Comprehensive Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

jobs:
  review:
    name: Comprehensive review with Claude Code
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run comprehensive review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat .github/prompts/review-bugs.md)" \
            --allowedTools "Read,Bash,Write" \
            --output-format text > REPORTE-REVISION-INTEGRAL.md 2>&1 || true
        continue-on-error: true

      - name: Post report as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Comprehensive Code Review — Claude Code\n\n';

            if (fs.existsSync('REPORTE-REVISION-INTEGRAL.md')) {
              const report = fs.readFileSync('REPORTE-REVISION-INTEGRAL.md', 'utf8');
              // Limit to 65000 characters to avoid GitHub comment limit
              body += report.length > 65000
                ? report.substring(0, 65000) + '\n\n_[Report truncated — see full artifact]_'
                : report;
            } else {
              body += '_Could not generate report. Check workflow logs._';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comprehensive-review-report
          path: REPORTE-REVISION-INTEGRAL.md
          retention-days: 30
