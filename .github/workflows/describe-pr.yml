name: Automatic PR Description

on:
  pull_request:
    types: [opened]
    branches: [main, master, develop]

jobs:
  describe:
    name: Generate PR description with Claude Code
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD --stat > /tmp/diff-stat.txt
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/diff-full.txt
          git log origin/${{ github.base_ref }}..HEAD --oneline > /tmp/commits.txt
          echo "Branch: ${{ github.head_ref }}" > /tmp/pr-context.txt
          echo "Base: ${{ github.base_ref }}" >> /tmp/pr-context.txt
          echo "PR title: ${{ github.event.pull_request.title }}" >> /tmp/pr-context.txt

      - name: Generate description with Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT="$(cat .github/prompts/describe-pr.md)"
          CONTEXT="PR context:
          $(cat /tmp/pr-context.txt)

          Commits included:
          $(cat /tmp/commits.txt)

          Modified files:
          $(cat /tmp/diff-stat.txt)

          Full diff:
          $(head -c 20000 /tmp/diff-full.txt)"

          claude -p "$PROMPT

          $CONTEXT" \
            --allowedTools "Read,Bash,Write" \
            --output-format text > PR-DESCRIPTION.md 2>&1 || true
        continue-on-error: true

      - name: Update PR description
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '';

            if (fs.existsSync('PR-DESCRIPTION.md')) {
              body = fs.readFileSync('PR-DESCRIPTION.md', 'utf8');
            } else {
              body = '_Could not generate description automatically._';
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });
