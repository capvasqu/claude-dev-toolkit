name: Analisis de Deuda Tecnica

on:
  # Ejecutar cada lunes a las 8am UTC (5am Chile)
  schedule:
    - cron: '0 8 * * 1'
  # Permitir ejecucion manual desde GitHub Actions
  workflow_dispatch:

jobs:
  tech-debt:
    name: Detectar deuda tecnica con Claude Code
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ejecutar analisis de deuda tecnica
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/prompts/tech-debt.md)" \
            --allowedTools "Read,Bash" \
            --output-format text > REPORTE-DEUDA-TECNICA.md 2>&1 || true
          echo "=== CONTENIDO DEL REPORTE ==="
          cat REPORTE-DEUDA-TECNICA.md
          echo "=== FIN DEL REPORTE ==="
        continue-on-error: true

      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-deuda-tecnica-${{ github.run_number }}
          path: REPORTE-DEUDA-TECNICA.md
          retention-days: 90

      - name: Crear issue con resumen de deuda tecnica
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Reporte de Deuda Tecnica — Analisis automatico\n\n';
            body += `**Fecha:** ${new Date().toISOString().split('T')[0]}\n\n`;

            if (fs.existsSync('REPORTE-DEUDA-TECNICA.md')) {
              const reporte = fs.readFileSync('REPORTE-DEUDA-TECNICA.md', 'utf8');
              body += reporte.length > 60000
                ? reporte.substring(0, 60000) + '\n\n_[Ver artefacto completo en el workflow]_'
                : reporte;
            } else {
              body += '_No se pudo generar el reporte._';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deuda Tecnica — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['tech-debt', 'automated']
            });
