name: Technical Debt Analysis

on:
  # Run every Monday at 8am UTC (5am Chile)
  schedule:
    - cron: '0 8 * * 1'
  # Allow manual execution from GitHub Actions
  workflow_dispatch:

jobs:
  tech-debt:
    name: Detect technical debt with Claude Code
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run technical debt analysis
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat .github/prompts/tech-debt.md)" \
            --allowedTools "Read,Bash,Write" \
            --output-format text > REPORTE-DEUDA-TECNICA.md 2>&1 || true
          cat REPORTE-DEUDA-TECNICA.md
        continue-on-error: true

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tech-debt-report-${{ github.run_number }}
          path: REPORTE-DEUDA-TECNICA.md
          retention-days: 90

      - name: Create issue with technical debt summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Technical Debt Report — Automated Analysis\n\n';
            body += `**Date:** ${new Date().toISOString().split('T')[0]}\n\n`;

            if (fs.existsSync('REPORTE-DEUDA-TECNICA.md')) {
              const report = fs.readFileSync('REPORTE-DEUDA-TECNICA.md', 'utf8');
              body += report.length > 60000
                ? report.substring(0, 60000) + '\n\n_[See full artifact in workflow]_'
                : report;
            } else {
              body += '_Could not generate report._';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Technical Debt — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['tech-debt', 'automated']
            });
